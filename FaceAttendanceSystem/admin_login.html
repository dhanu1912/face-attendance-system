<!DOCTYPE html>
<html>
<head>
<title>Admin Login - Attendify</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000428,#004e92);
font-family:Poppins;
color:white;
}

.login-box{
width:350px;
padding:40px;
background:rgba(255,255,255,0.1);
border-radius:15px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:25px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#00bfff;
color:white;
cursor:pointer;
}

.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form action="admin_login.php" method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="error">

<script>
const params = new URLSearchParams(window.location.search);
if(params.get("error")){
document.write(params.get("error"));
}
</script>

</div>

</div>

</body>
</html>
