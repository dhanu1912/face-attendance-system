
<!DOCTYPE html>
<html>
<head>
<title>Register - Attendify</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000428,#004e92);
color:white;
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffff55,transparent 70%);
top:-150px;
left:-150px;
animation:moveGlow 6s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
0%{transform:translate(0,0);}
100%{transform:translate(200px,200px);}
}

.form-box{
width:400px;
padding:40px;
background:rgba(180, 15, 15, 0.08);
backdrop-filter:blur(15px);
border-radius:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.4);
text-align:center;
}

.form-box h2{
margin-bottom:25px;
color:#ffffff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:30px;
outline:none;
font-size:15px;
background: rgba(255, 255, 255, 0.08);
color:white;
}

input[type="file"]{
color: white;
border-radius:30px;
background: rgba(255,255,255,0.08);
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#00ffff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px #00ffff80;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00ffff;
}

a{
color:#00ffff;
text-decoration:none;
font-size:14px;
}
input::placeholder{
    color: #faf9f9;   
}
</style>
</head>

<body>

<div class="form-box">
<h2>Create Account</h2>

<form action="register.php" method="POST" enctype="multipart/form-data">

<input type="text" name="enrollmentno" placeholder="Enrollment No" required>

<input type="text" name="name" placeholder="Name" required>

<input type="password" name="password" placeholder="Password" required>

<select name="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<input type="file" name="photo" required>
<button type="submit">Register</button>
</form>
<div style="color:red; margin-top:10px; font-weight:bold;">
<script>
const params = new URLSearchParams(window.location.search);
if(params.get("error")){
document.write(params.get("error"));
}
</script>
</div>
<br>
<a href="login.html">Already have account? Login</a>
</div>

</body>
</html>
